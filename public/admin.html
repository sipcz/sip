<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <title>Admin Panel — AutoSale Premium</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        :root {
            --bg: #000;
            --text: #fff;
            --accent: #d4af37;
            --card-bg: rgba(255, 255, 255, 0.07);
            --input-bg: rgba(255, 255, 255, 0.1);
        }

        body {
            margin: 0;
            background: var(--bg);
            color: var(--text);
            font-family: 'Segoe UI', Arial, sans-serif;
            transition: 0.3s;
            min-height: 100vh;
        }

        /* Відео-фон */
        .video-bg {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: -1; overflow: hidden;
        }
        .video-bg video {
            width: 100%; height: 100%;
            object-fit: cover;
            filter: brightness(0.35);
        }

        nav {
            position: fixed;
            top: 0; width: 100%; padding: 15px 5%;
            background: rgba(0,0,0,0.85);
            backdrop-filter: blur(15px);
            z-index: 1000;
            border-bottom: 1px solid rgba(212, 175, 55, 0.3);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        nav a {
            color: var(--accent);
            text-decoration: none;
            font-weight: bold;
            text-transform: uppercase;
            font-size: 14px;
        }

        .admin-container { 
            padding-top: 120px; 
            display: flex;
            flex-direction: column;
            align-items: center;
            padding-bottom: 50px;
        }

        .admin-box { 
            width: 100%;
            max-width: 450px; 
            margin: 20px auto; 
            background: var(--card-bg); 
            backdrop-filter: blur(20px);
            padding: 30px; 
            border-radius: 20px; 
            border: 1px solid rgba(212, 175, 55, 0.2);
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        h2, h3 { color: var(--accent); text-transform: uppercase; letter-spacing: 1px; }

        input { 
            width: 100%; 
            padding: 12px; 
            margin: 10px 0; 
            border-radius: 8px; 
            border: 1px solid rgba(255,255,255,0.1); 
            background: var(--input-bg);
            color: white;
            outline: none;
            transition: 0.3s;
            box-sizing: border-box;
        }

        input:focus { border-color: var(--accent); background: rgba(255,255,255,0.15); }

        button { 
            width: 100%;
            padding: 14px; 
            background: var(--accent); 
            border: none; 
            border-radius: 8px; 
            cursor: pointer; 
            font-weight: 900; 
            text-transform: uppercase;
            color: black;
            margin-top: 15px;
            transition: 0.3s;
        }

        button:hover { background: white; transform: translateY(-2px); }

        .car-list-admin { 
            width: 100%;
            max-width: 900px;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 20px;
            margin-top: 30px;
            padding: 0 20px;
            box-sizing: border-box;
        }

        .car-item { 
            background: var(--card-bg); 
            backdrop-filter: blur(10px);
            padding: 20px; 
            border-radius: 15px; 
            border: 1px solid rgba(212, 175, 55, 0.15);
            text-align: left;
        }

        .car-item strong { color: var(--accent); font-size: 18px; display: block; margin-bottom: 5px; }

        .car-item button { 
            background: #ff4d4d; 
            color: white; 
            margin-top: 15px; 
            padding: 10px;
            font-size: 12px;
        }
        
        .car-item button:hover { background: white; color: black; }

        @media (max-width: 500px) {
            .admin-box { width: 90%; }
        }
    </style>
</head>

<body>

<div class="video-bg">
    <video autoplay muted loop playsinline>
        <source src="video/video.mp4" type="video/mp4">
    </video>
</div>

<nav>
    <a href="/">← Назад на сайт</a>
    <div style="color: var(--accent); font-weight: bold; letter-spacing: 2px;">AUTOSALE ADMIN</div>
</nav>

<div class="admin-container">

    <div id="loginBox" class="admin-box">
        <h3>Вхід в систему</h3>
        <input type="password" id="adminPass" placeholder="Введіть пароль">
        <button onclick="login()">Увійти</button>
    </div>

    <div id="adminPanel" style="display:none; width: 100%;">

        <div class="admin-box">
            <h2>Додати нове авто</h2>

            <input id="carName" placeholder="Назва (напр. X5)">
            <input id="carBrand" placeholder="Марка (BMW, Audi...)">
            <input id="carYear" placeholder="Рік випуску" type="number">
            <input id="carPrice" placeholder="Ціна (€)" type="number">
            <input id="carImg" placeholder="Посилання на фото (https://...)">

            <button onclick="addCar()">Додати в каталог</button>
        </div>

        <h2 style="text-align: center; margin-top: 40px; color: var(--accent);">Керування каталогом</h2>
        <div id="adminCarList" class="car-list-admin"></div>

    </div>

</div>

<script>
    let CURRENT_PASS = "";

    async function login() {
        const passInput = document.getElementById("adminPass").value;
        const btn = document.querySelector("#loginBox button");
        btn.innerText = "Перевірка...";

        try {
            const res = await fetch('/api/admin/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ pass: passInput })
            });
            const data = await res.json();

            if (res.ok && data.success) {
                CURRENT_PASS = passInput;
                document.getElementById("loginBox").style.display = "none";
                document.getElementById("adminPanel").style.display = "block";
                renderCars();
            } else {
                alert(data.error || "Невірний пароль!"); 
            }
        } catch (err) {
            alert("Помилка з'єднання з сервером.");
        } finally {
            btn.innerText = "Увійти";
        }
    }

    async function addCar() {
        const car = {
            brand: document.getElementById("carBrand").value,
            name: document.getElementById("carName").value,
            year: document.getElementById("carYear").value,
            price: document.getElementById("carPrice").value,
            img: document.getElementById("carImg").value
        };

        if (!car.name || !car.price || !car.brand) return alert("Заповніть основні поля!");

        const btn = document.querySelector("#adminPanel button");
        btn.innerText = "Додаємо...";

        try {
            const res = await fetch('/api/cars/add', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ pass: CURRENT_PASS, car: car })
            });

            if (res.ok) {
                alert("Авто успішно додано в каталог!");
                renderCars();
                document.querySelectorAll('#adminPanel input').forEach(i => i.value = '');
            } else {
                alert("Помилка: доступ заборонено!");
            }
        } catch (err) {
            alert("Помилка мережі!");
        } finally {
            btn.innerText = "Додати в каталог";
        }
    }

    async function deleteCar(index) {
        if (!confirm("Дійсно видалити це авто з каталогу?")) return;
        
        try {
            const res = await fetch('/api/cars/delete', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ pass: CURRENT_PASS, index: index })
            });

            if (res.ok) {
                renderCars();
            } else {
                alert("Помилка видалення!");
            }
        } catch (err) {
            alert("Помилка з'єднання!");
        }
    }

    async function renderCars() {
        const list = document.getElementById("adminCarList");
        try {
            const res = await fetch('/api/cars/public');
            const cars = await res.json();
            
            list.innerHTML = cars.map((c, i) => `
                <div class="car-item">
                    <img src="${c.img}" style="width:100%; height:160px; object-fit:cover; border-radius:10px; margin-bottom:10px;" alt="Car">
                    <strong>${c.brand} ${c.name}</strong>
                    <div style="color:#ccc; margin:5px 0; font-size:14px;">Рік: ${c.year} | Ціна: <span style="color:var(--accent); font-weight:bold;">${c.price} €</span></div>
                    <button onclick="deleteCar(${i})">Видалити авто</button>
                </div>
            `).join('');
        } catch(e) {
            list.innerHTML = "<p style='color:red;'>Помилка завантаження бази авто</p>";
        }
    }
</script>

</body>
</html>
