<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <title>AutoSale Premium</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        :root {
            --bg: #000;
            --text: #fff;
            --accent: #d4af37;
            --card-bg: rgba(0,0,0,0.65);
            --input-bg: rgba(255, 255, 255, 0.1);
        }

        .light-theme {
            --bg: #f5f5f5;
            --text: #111;
            --accent: #b8860b;
            --card-bg: rgba(255,255,255,0.7);
            --input-bg: rgba(0, 0, 0, 0.05);
        }

        * { box-sizing: border-box; }

        body {
            margin: 0;
            background: var(--bg);
            color: var(--text);
            font-family: Arial, sans-serif;
            transition: 0.3s;
            overflow-x: hidden;
        }

        html { scroll-behavior: smooth; }

        /* Відео-фон */
        .video-bg {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: -1; overflow: hidden;
        }

        .video-bg video {
            width: 100%; height: 100%;
            object-fit: cover;
            filter: brightness(0.4);
        }

        /* Меню */
        nav {
            position: fixed;
            top: 0; width: 100%; padding: 15px 0;
            background: rgba(0,0,0,0.7);
            backdrop-filter: blur(8px);
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 40px;
            z-index: 100;
        }

        nav .logo {
            font-size: 26px;
            font-weight: bold;
            color: var(--accent);
            text-shadow: 0 0 10px black;
        }

        nav .menu { display: flex; align-items: center; }

        nav .menu a {
            color: var(--text);
            margin: 0 15px;
            text-decoration: none;
            font-size: 16px;
            transition: 0.3s;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        nav .menu a:hover { color: var(--accent); }

        .theme-toggle {
            background: var(--accent);
            color: #000;
            border: none;
            padding: 8px 15px;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
        }

        .burger { display: none; font-size: 28px; cursor: pointer; color: var(--accent); }

        /* Секції контенту */
        .content {
            padding: 120px 20px 60px;
            text-align: center;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        h1 { font-size: 42px; color: var(--accent); text-shadow: 0 0 10px black; margin-bottom: 20px; }

        /* ФОРМА ТАКСІ - ВИПРАВЛЕННЯ ЗМІЩЕННЯ */
        .taxi-container {
            background: var(--card-bg);
            backdrop-filter: blur(10px);
            padding: 30px;
            border-radius: 15px;
            border: 1px solid rgba(212, 175, 55, 0.3);
            width: 100%;
            max-width: 450px;
        }

        .form-row {
            display: flex;
            align-items: center;
            margin-bottom: 15px;
            text-align: left;
        }

        .form-row label {
            width: 120px; /* Фіксована ширина лікує зміщення */
            min-width: 120px;
            color: var(--accent);
            font-weight: bold;
            font-size: 14px;
        }

        .form-row input, .form-row textarea {
            flex: 1;
            padding: 10px;
            border-radius: 6px;
            border: 1px solid rgba(255,255,255,0.2);
            background: var(--input-bg);
            color: var(--text);
            font-size: 15px;
            outline: none;
        }

        .form-row input:focus { border-color: var(--accent); }

        /* Антибот */
        .antibot-box {
            margin: 20px 0;
            padding: 15px;
            border: 1px dashed var(--accent);
            border-radius: 10px;
            background: rgba(0,0,0,0.3);
        }

        .antibot-box label {
            display: block;
            margin-bottom: 10px;
            font-weight: bold;
        }

        #bot-letters {
            background: var(--accent);
            color: #000;
            padding: 2px 8px;
            border-radius: 4px;
            font-family: monospace;
            font-size: 20px;
            letter-spacing: 3px;
        }

        #antibot {
            width: 70px;
            text-align: center;
            font-size: 18px;
            padding: 5px;
            background: #fff;
            color: #000;
            border: none;
            border-radius: 4px;
        }

        .submit-btn {
            width: 100%;
            padding: 15px;
            background: var(--accent);
            color: #000;
            border: none;
            font-weight: bold;
            text-transform: uppercase;
            border-radius: 6px;
            cursor: pointer;
            transition: 0.3s;
        }

        .submit-btn:hover { transform: scale(1.02); background: #f1c40f; }

        /* Мобільна версія */
        @media (max-width: 768px) {
            nav { justify-content: space-between; padding: 15px 20px; }
            .menu {
                display: none; position: absolute; top: 70px; right: 0;
                background: rgba(0,0,0,0.9); width: 200px; flex-direction: column;
                padding: 20px; border-radius: 0 0 0 10px;
            }
            .menu.active { display: flex; }
            .burger { display: block; }
            .form-row { flex-direction: column; align-items: flex-start; }
            .form-row label { margin-bottom: 5px; width: 100%; }
        }
    </style>
</head>

<body>

<div class="video-bg">
    <video autoplay muted loop playsinline>
        <source src="video/video.mp4" type="video/mp4">
    </video>
</div>

<nav>
    <div class="logo">AutoSale</div>
    <div class="menu" id="navMenu">
        <a href="#home">Головна</a>
        <a href="#catalog">Каталог</a>
        <a href="#services">Послуги</a>
        <a href="#taxi">Таксі</a>
        <a href="#contact">Контакти</a>
    </div>
    <button class="theme-toggle" onclick="toggleTheme()">Тема</button>
    <div class="burger" onclick="toggleMenu()">☰</div>
</nav>

<div class="content" id="home">
    <h1>AutoSale Premium</h1>
    <p style="font-size: 20px;">Елітні автомобілі. Преміальний сервіс.</p>
</div>

<div class="content" id="taxi">
    <h1>Виклик таксі</h1>
    
    <div class="taxi-container">
        <form id="taxiForm">
            <input type="text" name="secret" style="display:none">

            <div class="form-row">
                <label>Ваше ім'я:</label>
                <input type="text" name="name" placeholder="Введіть ім'я" required>
            </div>

            <div class="form-row">
                <label>Телефон:</label>
                <input type="tel" name="phone" placeholder="+380..." required>
            </div>

            <div class="form-row">
                <label>Адреса:</label>
                <input type="text" name="address" placeholder="Куди подати авто?" required>
            </div>

            <div class="form-row">
                <label>Коментар:</label>
                <textarea name="comment" rows="2" placeholder="Напр: бізнес-клас"></textarea>
            </div>

            <div class="antibot-box" id="captchaBox">
                <label>🔐 Антибот: введіть <span id="bot-letters">--</span></label>
                <input type="text" id="antibot" name="antibot" maxlength="2" required>
            </div>

            <button type="submit" class="submit-btn">Замовити таксі 🚕</button>
        </form>
        <p id="taxiStatus" style="margin-top:15px; font-weight:bold; color:var(--accent);"></p>
    </div>
</div>

<script>
// --- ЛОГІКА МЕНЮ ТА ТЕМИ ---
function toggleTheme() {
    document.body.classList.toggle("light-theme");
}

function toggleMenu() {
    document.getElementById("navMenu").classList.toggle("active");
}

// Закриття меню при кліку на посилання (для мобілок)
document.querySelectorAll('.menu a').forEach(link => {
    link.onclick = () => document.getElementById("navMenu").classList.remove("active");
});

// --- ЛОГІКА АНТИБОТА ТА ВІДПРАВКИ ---
document.addEventListener("DOMContentLoaded", () => {
    const form = document.getElementById("taxiForm");
    const botLettersEl = document.getElementById("bot-letters");

    function generateCaptcha() {
        const letters = "ABCDEFGHJKLMNPQRSTUVWXYZ";
        const code = letters[Math.floor(Math.random() * letters.length)] + 
                     letters[Math.floor(Math.random() * letters.length)];
        botLettersEl.innerText = code;
        
        let hidden = form.querySelector('input[name="expected"]');
        if (!hidden) {
            hidden = document.createElement("input");
            hidden.type = "hidden";
            hidden.name = "expected";
            form.appendChild(hidden);
        }
        hidden.value = code;
    }

    generateCaptcha();

    // Перевірка Whitelist
    fetch("/api/taxi/check-ip")
        .then(r => r.json())
        .then(data => {
            if (data.whitelisted) document.getElementById("captchaBox").style.display = "none";
        }).catch(() => {});

    // Відправка форми
    form.onsubmit = async (e) => {
        e.preventDefault();
        const status = document.getElementById("taxiStatus");
        status.innerText = "Відправка...";

        const data = Object.fromEntries(new FormData(form).entries());

        try {
            const res = await fetch("/api/taxi", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify(data)
            });
            const text = await res.text();
            status.innerText = text;
            if (res.ok) {
                form.reset();
                generateCaptcha();
            }
        } catch (err) {
            status.innerText = "Помилка мережі";
        }
    };
});
</script>

</body>
</html>
