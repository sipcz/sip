<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <title>AutoSale Premium | Luxury Taxi</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        :root {
            --bg: #000;
            --text: #fff;
            --accent: #d4af37;
            --card-bg: rgba(255, 255, 255, 0.07);
            --input-bg: rgba(255, 255, 255, 0.1);
        }

        .light-theme {
            --bg: #f5f5f5;
            --text: #111;
            --accent: #b8860b;
            --card-bg: rgba(0, 0, 0, 0.05);
            --input-bg: rgba(0, 0, 0, 0.03);
        }

        * { box-sizing: border-box; }
        html { scroll-behavior: smooth; }

        body {
            margin: 0;
            background: var(--bg);
            color: var(--text);
            font-family: 'Segoe UI', Arial, sans-serif;
            transition: 0.3s;
        }

        /* Відео-фон */
        .video-bg {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: -1; overflow: hidden;
        }
        .video-bg video {
            width: 100%; height: 100%;
            object-fit: cover;
            filter: brightness(0.35);
        }

        /* Навігація */
        nav {
            position: fixed;
            top: 0; width: 100%; padding: 15px 5%;
            background: rgba(0,0,0,0.85);
            backdrop-filter: blur(15px);
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 1000;
            border-bottom: 1px solid rgba(212, 175, 55, 0.3);
        }

        .logo { 
            font-size: 26px; 
            font-weight: 900; 
            color: var(--accent); 
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .menu { display: flex; gap: 20px; }
        .menu a {
            color: var(--text);
            text-decoration: none;
            font-size: 14px;
            font-weight: 600;
            text-transform: uppercase;
            transition: 0.3s;
        }
        .menu a:hover { color: var(--accent); }

        .nav-right { display: flex; align-items: center; gap: 15px; }

        .theme-toggle {
            background: var(--accent); border: none; color: #000;
            padding: 7px 15px; border-radius: 5px; cursor: pointer; font-weight: bold;
        }

        .burger { display: none; font-size: 28px; cursor: pointer; color: var(--accent); }

        /* Секції */
        section {
            padding: 140px 5% 80px;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
        }

        h1 { font-size: 3.5rem; color: var(--accent); text-transform: uppercase; margin-bottom: 10px; }

        /* КАТАЛОГ */
        #carsContainer {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 25px; width: 100%; max-width: 1200px; margin-top: 40px;
        }

        /* ФОРМА ТАКСІ */
        .taxi-card {
            background: var(--card-bg);
            backdrop-filter: blur(20px);
            padding: 40px; border-radius: 20px;
            border: 1px solid rgba(212, 175, 55, 0.2);
            width: 100%; max-width: 500px; text-align: left;
        }

        .form-row { display: flex; align-items: center; margin-bottom: 20px; }
        .form-row label { width: 130px; min-width: 130px; color: var(--accent); font-weight: bold; }

        .input-group {
            flex: 1; display: flex; align-items: center;
            background: var(--input-bg); border: 1px solid rgba(255,255,255,0.1);
            border-radius: 8px; overflow: hidden;
        }

        .input-group input, .input-group textarea {
            width: 100%; padding: 12px; background: transparent; border: none; color: #fff; outline: none;
        }

        .geo-btn { background: none; border: none; color: var(--accent); cursor: pointer; padding: 0 10px; font-size: 18px; }

        .antibot-box { 
            border: 1px dashed var(--accent); padding: 15px; border-radius: 10px; 
            text-align: center; margin-bottom: 20px; 
        }
        #bot-letters { background: var(--accent); color: #000; padding: 2px 10px; border-radius: 4px; font-weight: bold; font-size: 20px; }

        .submit-btn {
            width: 100%; padding: 15px; background: var(--accent); color: #000;
            border: none; border-radius: 8px; font-weight: 800; cursor: pointer; transition: 0.3s;
        }
        .submit-btn:hover { background: #fff; transform: translateY(-2px); }

        /* Мобільна версія */
        @media (max-width: 850px) {
            .menu {
                display: none; position: absolute; top: 70px; right: 0;
                background: rgba(0,0,0,0.95); width: 220px;
                flex-direction: column; padding: 30px; border-radius: 0 0 0 15px;
            }
            .menu.active { display: flex; }
            .burger { display: block; }
            .form-row { flex-direction: column; align-items: flex-start; }
            .form-row label { margin-bottom: 5px; }
        }
    </style>
</head>
