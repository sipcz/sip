<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <title>AutoSale Premium | Виклик таксі</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        :root {
            --bg: #000;
            --text: #fff;
            --accent: #d4af37;
            --card-bg: rgba(255, 255, 255, 0.1);
            --input-bg: rgba(255, 255, 255, 0.05);
        }

        body {
            margin: 0;
            background: var(--bg);
            color: var(--text);
            font-family: 'Segoe UI', Arial, sans-serif;
        }

        /* Відео-фон */
        .video-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            overflow: hidden;
        }
        .video-bg video {
            width: 100%;
            height: 100%;
            object-fit: cover;
            filter: brightness(0.3);
        }

        /* Контент */
        .container {
            max-width: 500px;
            margin: 100px auto;
            padding: 30px;
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(10px);
            border-radius: 15px;
            border: 1px solid rgba(212, 175, 55, 0.3);
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        h1 {
            text-align: center;
            color: var(--accent);
            margin-bottom: 30px;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        /* ВИПРАВЛЕННЯ ЗМІЩЕННЯ (Flexbox Layout) */
        .form-group {
            display: flex;
            align-items: center;
            margin-bottom: 15px;
        }

        .form-group label {
            width: 130px; /* Фіксована ширина для всіх підписів */
            min-width: 130px;
            color: var(--accent);
            font-size: 14px;
            font-weight: bold;
        }

        .form-group input, 
        .form-group textarea {
            flex: 1; /* Займає весь вільний простір */
            background: var(--input-bg);
            border: 1px solid rgba(212, 175, 55, 0.5);
            padding: 10px;
            color: #fff;
            border-radius: 5px;
            outline: none;
            transition: 0.3s;
            box-sizing: border-box;
        }

        .form-group input:focus, 
        .form-group textarea:focus {
            border-color: var(--accent);
            background: rgba(255, 255, 255, 0.1);
            box-shadow: 0 0 8px rgba(212, 175, 55, 0.4);
        }

        /* Антибот */
        .antibot-box {
            background: rgba(212, 175, 55, 0.1);
            padding: 15px;
            border-radius: 8px;
            text-align: center;
            margin: 20px 0;
            border: 1px dashed var(--accent);
        }

        .antibot-box label {
            display: block;
            margin-bottom: 10px;
            font-weight: bold;
        }

        #bot-letters {
            background: #fff;
            color: #000;
            padding: 3px 10px;
            border-radius: 4px;
            font-family: monospace;
            font-size: 20px;
            letter-spacing: 4px;
            margin: 0 5px;
        }

        #antibot {
            width: 60px;
            text-align: center;
            font-size: 18px;
            padding: 5px;
            text-transform: uppercase;
        }

        /* Кнопка */
        .submit-btn {
            width: 100%;
            padding: 15px;
            background: var(--accent);
            color: #000;
            border: none;
            font-weight: bold;
            font-size: 16px;
            border-radius: 5px;
            cursor: pointer;
            transition: 0.3s;
        }

        .submit-btn:hover {
            background: #f1c40f;
            transform: translateY(-2px);
        }

        #taxiStatus {
            text-align: center;
            margin-top: 15px;
            font-weight: bold;
            min-height: 24px;
        }

        /* Мобільна версія */
        @media (max-width: 600px) {
            .form-group {
                flex-direction: column;
                align-items: flex-start;
            }
            .form-group label {
                margin-bottom: 5px;
                width: 100%;
            }
        }
    </style>
</head>
<body>

<div class="video-bg">
    <video autoplay muted loop playsinline>
        <source src="video/video.mp4" type="video/mp4">
    </video>
</div>

<div class="container">
    <h1>Виклик таксі</h1>

    <form id="taxiForm">
        <input type="text" name="secret" style="display:none">

        <div class="form-group">
            <label>Ваше ім'я:</label>
            <input type="text" name="name" placeholder="Олександр" required>
        </div>

        <div class="form-group">
            <label>Телефон:</label>
            <input type="tel" name="phone" placeholder="+380..." required>
        </div>

        <div class="form-group">
            <label>Адреса подачі:</label>
            <input type="text" name="address" placeholder="вул. Хрещатик, 1" required>
        </div>

        <div class="form-group">
            <label>Коментар:</label>
            <textarea name="comment" rows="3" placeholder="Додаткові побажання..."></textarea>
        </div>

        <div class="antibot-box" id="antibotContainer">
            <label>🔐 Підтвердіть: введіть <span id="bot-letters">--</span></label>
            <input type="text" id="antibot" name="antibot" maxlength="2" required>
        </div>

        <button type="submit" class="submit-btn">ВІДПРАВИТИ ЗАЯВКУ 🚕</button>
        <div id="taxiStatus"></div>
    </form>
</div>

<script>
document.addEventListener("DOMContentLoaded", () => {
    const form = document.getElementById("taxiForm");
    const botLettersEl = document.getElementById("bot-letters");
    const statusEl = document.getElementById("taxiStatus");

    // 1. Генерація Антибота
    function generateCaptcha() {
        const letters = "ABCDEFGHJKLMNPQRSTUVWXYZ";
        const code = letters[Math.floor(Math.random() * letters.length)] +
                     letters[Math.floor(Math.random() * letters.length)];
        
        botLettersEl.innerText = code;

        // Оновлюємо або створюємо приховане поле для перевірки на бекенді
        let hidden = form.querySelector('input[name="expected"]');
        if (!hidden) {
            hidden = document.createElement("input");
            hidden.type = "hidden";
            hidden.name = "expected";
            form.appendChild(hidden);
        }
        hidden.value = code;
    }

    generateCaptcha();

    // 2. Перевірка на WhiteList (щоб сховати антибот)
    fetch("/api/taxi/check-ip")
        .then(r => r.json())
        .then(data => {
            if (data.whitelisted) {
                document.getElementById("antibotContainer").style.display = "none";
                document.getElementById("antibot").removeAttribute("required");
            }
        }).catch(e => console.log("Check IP failed"));

    // 3. Відправка форми
    form.addEventListener("submit", async (e) => {
        e.preventDefault();
        statusEl.style.color = "var(--accent)";
        statusEl.innerText = "Обробка запиту...";

        const formData = new FormData(form);
        const data = Object.fromEntries(formData.entries());

        try {
            const res = await fetch("/api/taxi", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify(data)
            });

            const resultText = await res.text();

            if (res.ok) {
                statusEl.style.color = "#2ecc71";
                statusEl.innerText = "✅ " + resultText;
                form.reset();
                generateCaptcha();
            } else {
                statusEl.style.color = "#e74c3c";
                statusEl.innerText = "❌ " + resultText;
            }
        } catch (err) {
            statusEl.style.color = "#e74c3c";
            statusEl.innerText = "⚠️ Помилка з'єднання з сервером";
        }
    });
});
</script>

</body>
</html>
