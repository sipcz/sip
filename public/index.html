<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <title>AutoSale Premium</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        :root {
            --bg: #000;
            --text: #fff;
            --accent: #d4af37;
            --card-bg: rgba(0,0,0,0.65);
        }

        .light-theme {
            --bg: #f5f5f5;
            --text: #111;
            --accent: #b8860b;
            --card-bg: rgba(255,255,255,0.7);
        }

        * { box-sizing: border-box; }

        body {
            margin: 0;
            background: var(--bg);
            color: var(--text);
            font-family: Arial, sans-serif;
            transition: 0.3s;
        }

        html { scroll-behavior: smooth; }

        /* Відео-фон */
        .video-bg {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: -1; overflow: hidden;
        }
        .video-bg video {
            width: 100%; height: 100%;
            object-fit: cover;
            filter: brightness(0.4);
        }

        /* Меню */
        nav {
            position: fixed;
            top: 0; width: 100%; padding: 15px 0;
            background: rgba(0,0,0,0.7);
            backdrop-filter: blur(8px);
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 40px;
            z-index: 100;
        }

        nav .logo { font-size: 26px; font-weight: bold; color: var(--accent); }
        nav .menu { display: flex; }
        nav .menu a { color: var(--text); margin: 0 15px; text-decoration: none; font-size: 18px; transition: 0.3s; }
        nav .menu a:hover { color: var(--accent); }

        .theme-toggle {
            background: var(--accent); color: #000; border: none;
            padding: 5px 15px; border-radius: 5px; cursor: pointer; font-weight: bold;
        }

        .burger { display: none; font-size: 28px; cursor: pointer; color: var(--accent); }

        @media (max-width: 768px) {
            nav { justify-content: space-between; padding: 15px 20px; }
            .menu {
                position: absolute; top: 70px; right: 0;
                background: rgba(0,0,0,0.9); width: 200px;
                padding: 20px; display: none; flex-direction: column; text-align: right;
            }
            .menu.active { display: flex; }
            .burger { display: block; }
        }

        /* Контент */
        .content {
            padding: 120px 20px 60px;
            text-align: center;
            background: rgba(0,0,0,0.45);
            min-height: 100vh;
        }

        h1 { font-size: 48px; color: var(--accent); text-shadow: 0 0 10px black; }

        /* --- ФОРМА ТАКСІ --- */
        #taxiForm {
            max-width: 450px; margin: auto; text-align: left;
            background: var(--card-bg); padding: 25px;
            border-radius: 12px; border: 1px solid rgba(212, 175, 55, 0.3);
        }

        .form-row { display: flex; align-items: center; margin-bottom: 15px; }

        .form-row label { width: 130px; min-width: 130px; font-weight: bold; color: var(--accent); }

        .input-container { flex: 1; display: flex; gap: 5px; }

        .form-row input, .form-row textarea {
            width: 100%; padding: 10px; border-radius: 6px;
            border: 1px solid #555; background: rgba(255,255,255,0.1);
            color: white; outline: none;
        }

        /* Кнопка Геолокації */
        .geo-btn {
            background: var(--accent); border: none; border-radius: 6px;
            cursor: pointer; padding: 0 10px; font-size: 18px;
            transition: 0.3s; display: flex; align-items: center;
        }
        .geo-btn:hover { filter: brightness(1.2); }

        .antibot-box {
            margin-top: 15px; padding: 15px; background: rgba(0, 0, 0, 0.55);
            border: 1px dashed var(--accent); border-radius: 8px; text-align: center;
        }

        #bot-letters { background: var(--accent); color: black; padding: 2px 8px; border-radius: 4px; font-weight: bold; }

        #antibot { width: 70px; padding: 8px; margin-top: 10px; text-align: center; font-size: 18px; border-radius: 5px; }

        .submit-btn {
            width: 100%; padding: 12px; background: var(--accent);
            border: none; color: black; font-weight: bold; cursor: pointer;
            border-radius: 5px; margin-top: 15px; font-size: 16px;
        }
    </style>
</head>

<body>

<div class="video-bg">
    <video autoplay muted loop playsinline>
        <source src="video/video.mp4" type="video/mp4">
    </video>
</div>

<nav>
    <div class="logo">AutoSale</div>
    <div class="menu" id="mainMenu">
        <a href="#home">Головна</a>
        <a href="#catalog">Каталог</a>
        <a href="#about">Про нас</a>
        <a href="#services">Послуги</a>
        <a href="#contact">Контакти</a>
        <a href="#taxi">Таксі</a>
    </div>
    <button class="theme-toggle" onclick="toggleTheme()">Тема</button>
    <div class="burger" onclick="toggleMenu()">☰</div>
</nav>

<div class="content" id="home">
    <h1>AutoSale Premium</h1>
    <p>Елітні автомобілі. Преміальний сервіс.</p>
</div>

<div class="content" id="catalog">
    <h1>Каталог авто</h1>
    <div id="carsContainer" style="display:flex; flex-wrap:wrap; justify-content:center; gap:20px;"></div>
</div>

<div class="content" id="taxi">
    <h1>Виклик таксі</h1>
    <form id="taxiForm">
        <input type="text" name="secret" style="display:none">

        <div class="form-row">
            <label>Ваше ім'я:</label>
            <div class="input-container">
                <input type="text" name="name" required>
            </div>
        </div>

        <div class="form-row">
            <label>Телефон:</label>
            <div class="input-container">
                <input type="tel" name="phone" required>
            </div>
        </div>

        <div class="form-row">
            <label>Адреса:</label>
            <div class="input-container">
                <input type="text" name="address" id="addressInput" placeholder="Вулиця, номер..." required>
                <button type="button" class="geo-btn" onclick="getLocation()" title="Визначити моє місцезнаходження">📍</button>
            </div>
        </div>

        <div class="form-row">
            <label>Коментар:</label>
            <div class="input-container">
                <textarea name="comment" rows="2"></textarea>
            </div>
        </div>

        <div class="antibot-box" id="captchaBox">
            <label>🔐 Антибот: введіть <b id="bot-letters">--</b></label><br>
            <input type="text" id="antibot" name="antibot" maxlength="2" required>
        </div>

        <button type="submit" class="submit-btn">Викликати таксі 🚕</button>
    </form>
    <p id="taxiStatus" style="margin-top:20px; font-size:18px; color:var(--accent); font-weight:bold;"></p>
</div>

<script>
function toggleTheme() { document.body.classList.toggle("light-theme"); }
function toggleMenu() { document.getElementById("mainMenu").classList.toggle("active"); }

// ФУНКЦІЯ ГЕОЛОКАЦІЇ
function getLocation() {
    const btn = document.querySelector('.geo-btn');
    const input = document.getElementById('addressInput');
    
    if (navigator.geolocation) {
        btn.innerText = "⏳"; // Показуємо статус завантаження
        navigator.geolocation.getCurrentPosition(async (position) => {
            const lat = position.coords.latitude;
            const lon = position.coords.longitude;

            try {
                // Використовуємо Nominatim API для отримання адреси по координатах
                const response = await fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${lat}&lon=${lon}&addressdetails=1`);
                const data = await response.json();
                
                if (data.display_name) {
                    // Форматуємо адресу (вулиця + номер будинку)
                    const addr = data.address;
                    const street = addr.road || addr.street || "";
                    const house = addr.house_number || "";
                    input.value = `${street} ${house}`.trim() || data.display_name.split(',')[0];
                }
            } catch (err) {
                input.value = `${lat.toFixed(5)}, ${lon.toFixed(5)}`;
            }
            btn.innerText = "📍";
        }, (error) => {
            alert("Помилка: Не вдалося отримати доступ до геолокації.");
            btn.innerText = "📍";
        });
    } else {
        alert("Ваш браузер не підтримує геолокацію.");
    }
}

// ЗАВАНТАЖЕННЯ АВТО
async function loadCarsForSite() {
    try {
        const res = await fetch("/api/cars/public");
        const cars = await res.json();
        const container = document.getElementById("carsContainer");
        container.innerHTML = "";
        cars.forEach(car => {
            const div = document.createElement("div");
            div.style.width = "300px"; div.style.background = "var(--card-bg)";
            div.style.padding = "15px"; div.style.borderRadius = "10px";
            div.style.backdropFilter = "blur(6px)"; div.innerHTML = `
                <img src="${car.img}" style="width:100%; border-radius:10px; height:180px; object-fit:cover;">
                <h3 style="color:var(--accent); margin:10px 0 5px;">${car.name}</h3>
                <p>${car.brand} — ${car.year}</p>
                <p style="font-size:20px; color:var(--accent); font-weight:bold;">${car.price}€</p>
            `;
            container.appendChild(div);
        });
    } catch(e) {}
}
loadCarsForSite();

// АНТИБОТ ТА ВІДПРАВКА
document.addEventListener("DOMContentLoaded", () => {
    const form = document.getElementById("taxiForm");
    const botLettersEl = document.getElementById("bot-letters");

    function generateCaptcha() {
        const letters = "ABCDEFGHJKLMNPQRSTUVWXYZ";
        const code = letters[Math.floor(Math.random() * letters.length)] + 
                     letters[Math.floor(Math.random() * letters.length)];
        botLettersEl.innerText = code;
        let hidden = form.querySelector('input[name="expected"]');
        if (!hidden) {
            hidden = document.createElement("input");
            hidden.type = "hidden"; hidden.name = "expected";
            form.appendChild(hidden);
        }
        hidden.value = code;
    }
    generateCaptcha();

    form.onsubmit = async (e) => {
        e.preventDefault();
        const status = document.getElementById("taxiStatus");
        status.innerText = "Відправка...";
        const data = Object.fromEntries(new FormData(form).entries());
        try {
            const res = await fetch("/api/taxi", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify(data)
            });
            const msg = await res.text();
            status.innerText = msg;
            if (res.ok) { form.reset(); generateCaptcha(); }
        } catch (err) { status.innerText = "Помилка сервера"; }
    };
});
</script>

</body>
</html>
