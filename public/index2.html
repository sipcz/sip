<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <title>AutoSale Premium</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        :root {
            --bg: #000;
            --text: #fff;
            --accent: #d4af37; /* золото */
            --card-bg: rgba(0,0,0,0.65);
        }

        .light-theme {
            --bg: #f5f5f5;
            --text: #111;
            --accent: #b8860b;
            --card-bg: rgba(255,255,255,0.7);
        }

        body {
            margin: 0;
            background: var(--bg);
            color: var(--text);
            font-family: Arial, sans-serif;
            transition: 0.3s;
        }

        /* Відео-фон */
        .video-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            overflow: hidden;
        }

        .video-bg video {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        /* Меню */
        nav {
            position: fixed;
            top: 0;
            width: 100%;
            padding: 15px 0;
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(6px);
            text-align: center;
            z-index: 10;
        }

        nav a {
            color: var(--text);
            margin: 0 20px;
            text-decoration: none;
            font-size: 18px;
            transition: 0.3s;
        }

        nav a:hover {
            color: var(--accent);
        }

        /* Перемикач теми */
        .theme-toggle {
            position: absolute;
            right: 20px;
            top: 12px;
            background: var(--accent);
            border: none;
            padding: 8px 15px;
            border-radius: 5px;
            cursor: pointer;
            color: black;
            font-weight: bold;
        }

        /* Контент */
        .content {
            padding-top: 120px;
            text-align: center;
            background: rgba(0,0,0,0.45);
            min-height: 100vh;
        }

        h1 {
            font-size: 48px;
            color: var(--accent);
            text-shadow: 0 0 10px black;
        }

        p {
            font-size: 20px;
        }
    </style>
</head>

<body>

<!-- Відео на фоні -->
<div class="video-bg">
    <video autoplay muted loop>
        <source src="video/video.mp4" type="video/mp4">
    </video>
</div>

<!-- Меню -->
<nav>
    <a href="#home">Головна</a>
    <a href="#catalog">Каталог</a>
    <a href="#contact">Контакти</a>

    <button class="theme-toggle" onclick="toggleTheme()">Тема</button>
</nav>

<!-- Контент -->
<div class="content" id="home">
    <h1>AutoSale Premium</h1>
    <p>Елітні автомобілі. Преміальний сервіс.</p>
</div>

<script>
    function toggleTheme() {
        document.body.classList.toggle("light-theme");
    }
</script>

<div class="content" id="catalog">
    <h1>Каталог авто</h1>

    <div id="carsContainer"
         style="display:flex; flex-wrap:wrap; justify-content:center; gap:20px;">
    </div>
</div>

<script>
async function loadCarsForSite() {
    const res = await fetch("/api/cars/public");
    const cars = await res.json();

    const container = document.getElementById("carsContainer");
    container.innerHTML = "";

    cars.forEach(car => {
        const div = document.createElement("div");
        div.style.width = "300px";
        div.style.background = "var(--card-bg)";
        div.style.padding = "15px";
        div.style.borderRadius = "10px";
        div.style.backdropFilter = "blur(6px)";
        div.style.boxShadow = "0 0 10px rgba(0,0,0,0.5)";

        div.innerHTML = `
            <img src="${car.img}" style="width:100%; border-radius:10px;">
            <h3 style="color:var(--accent); margin:10px 0 5px;">${car.name}</h3>
            <p>${car.brand} — ${car.year}</p>
            <p style="font-size:20px; color:var(--accent); font-weight:bold;">
                ${car.price}€
            </p>
        `;

        container.appendChild(div);
    });
}

loadCarsForSite();
</script>

</body>
</html>
